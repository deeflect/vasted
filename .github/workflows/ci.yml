name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Sync deps
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy app tests bot.py
      - name: Pytest
        run: uv run pytest -q
